name: Build Multi-Platform

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  NODE_VERSION: '18'

jobs:
  # 获取版本号
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      tag_name: ${{ steps.get_version.outputs.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG_NAME="${{ github.ref_name }}"
          else
            TAG_NAME="v$VERSION"
          fi
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "Version: $VERSION, Tag: $TAG_NAME"

  build-macos-x64:
    name: Build macOS (x64)
    needs: get-version
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 执行构建
        run: npm run pkg:build:mac_x64

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: web-clipboard-macos-x64
          path: release-build/pkg/*
          retention-days: 30
          if-no-files-found: warn

  build-macos-arm64:
    name: Build macOS (arm64)
    needs: get-version
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 执行构建
        run: npm run pkg:build:mac_arm64

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: web-clipboard-macos-arm64
          path: release-build/pkg/*
          retention-days: 30
          if-no-files-found: warn

  build-windows:
    name: Build Windows (x64)
    needs: get-version
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 执行构建
        run: npm run pkg:build:win

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: web-clipboard-windows-x64
          path: release-build/pkg/*
          retention-days: 30
          if-no-files-found: warn

  build-linux:
    name: Build Linux (x64)
    needs: get-version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 执行构建
        run: npm run pkg:build:linux

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: web-clipboard-linux-x64
          path: release-build/pkg/*
          retention-days: 30
          if-no-files-found: warn

  create-release:
    name: 创建 Release
    needs: [get-version, build-macos-x64, build-macos-arm64, build-windows, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 下载所有产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: 显示文件列表
        run: find artifacts -type f | sort

      - name: 创建 Release
        uses: softprops/action-gh-release@v1
        with:
          name: Web Clipboard ${{ needs.get-version.outputs.tag_name }}
          tag_name: ${{ needs.get-version.outputs.tag_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
