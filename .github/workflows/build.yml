name: Build Multi-Platform

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  # 获取版本号
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      tag_name: ${{ steps.get_version.outputs.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG_NAME="${{ github.ref_name }}"
          else
            TAG_NAME="v$VERSION"
          fi
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

  # ============================================
  # macOS 构建
  # ============================================
  build-macos-x64:
    name: Build macOS x64
    needs: get-version
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx pkg start-connect-remote.js --targets node18-macos-x64 --output release-build/mac-x64/web-clipboard-macos-x64 --public

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-clipboard-mac-x64
          path: release-build/mac-x64/*

  build-macos-arm64:
    name: Build macOS arm64
    needs: get-version
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx pkg start-connect-remote.js --targets node18-macos-arm64 --output release-build/mac-arm64/web-clipboard-macos-arm64 --public

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-clipboard-mac-arm64
          path: release-build/mac-arm64/*

  # ============================================
  # Windows 构建
  # ============================================
  build-windows-x64:
    name: Build Windows x64
    needs: get-version
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx pkg start-connect-remote.js --targets node18-win-x64 --output release-build/win-x64/web-clipboard-win-x64.exe --public

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-clipboard-win-x64
          path: release-build/win-x64/*

  # ============================================
  # Linux 构建
  # ============================================
  build-linux-x64:
    name: Build Linux x64
    needs: get-version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx pkg start-connect-remote.js --targets node18-linux-x64 --output release-build/linux-x64/web-clipboard-linux-x64 --public

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-clipboard-linux-x64
          path: release-build/linux-x64/*

  build-linux-arm64:
    name: Build Linux arm64
    needs: get-version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx pkg start-connect-remote.js --targets node18-linux-arm64 --output release-build/linux-arm64/web-clipboard-linux-arm64 --public

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-clipboard-linux-arm64
          path: release-build/linux-arm64/*

  # ============================================
  # 创建 Release
  # ============================================
  create-release:
    name: Create Release
    needs: [get-version, build-windows-x64, build-linux-x64, build-linux-arm64, build-macos-x64, build-macos-arm64]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Show files
        run: find artifacts -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Web Clipboard ${{ needs.get-version.outputs.tag_name }}
          tag_name: ${{ needs.get-version.outputs.tag_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
